<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Candela Demo System</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap');
        :root { --accent: #3b7ef8; --bg: #f4f7fc; }
        body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); padding: 40px 20px; color: #333; }
        .container { max-width: 650px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #1a1d2e; font-size: 24px; margin-bottom: 30px; }
        .section { margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 20px; }
        .section-title { font-weight: 700; color: var(--accent); font-size: 14px; margin-bottom: 15px; text-transform: uppercase; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .field { margin-bottom: 10px; }
        label { display: block; font-size: 12px; color: #777; margin-bottom: 5px; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; background: var(--accent); color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 20px; }
        .btn:hover { background: #2a65d4; }
    </style>
</head>
<body>

<div class="container">
    <h1>데모 신청 & 합의서 생성</h1>
    
    <div class="section">
        <div class="section-title">기본 정보</div>
        <div class="grid">
            <div class="field"><label>신청자</label><input type="text" id="requester" value="박윤아"></div>
            <div class="field"><label>신청일자</label><input type="date" id="doc_date"></div>
        </div>
    </div>

    <div class="section">
        <div class="section-title">대상 병원</div>
        <div class="grid">
            <div class="field"><label>병원명</label><input type="text" id="hospital" placeholder="병원명 입력"></div>
            <div class="field"><label>원장명</label><input type="text" id="doctor" placeholder="원장님 성함"></div>
        </div>
        <div class="field"><label>주소</label><input type="text" id="address" placeholder="병원 주소"></div>
    </div>

    <div class="section">
        <div class="section-title">장비 정보</div>
        <div class="grid">
            <div class="field">
                <label>장비 모델</label>
                <select id="model">
                    <option value="GentleMax Pro Plus">GentleMax Pro Plus</option>
                    <option value="PicoWay">PicoWay</option>
                    <option value="Vbeam Perfecta">Vbeam Perfecta</option>
                    <option value="Nordlys">Nordlys</option>
                </select>
            </div>
            <div class="field"><label>사용 기간</label><input type="text" id="period" placeholder="예: 4/23 ~ 4/30"></div>
        </div>
        <div class="field"><label>상세 구성 (핸드피스 등)</label><textarea id="specs" rows="3"></textarea></div>
    </div>

    <button class="btn" onclick="exportToWord()">파일 다운로드 (MS Word용)</button>
</div>

<script>
    document.getElementById('doc_date').value = new Date().toISOString().substring(0, 10);

    function exportToWord() {
        // 입력 데이터 가져오기
        const data = {
            requester: document.getElementById('requester').value,
            date: document.getElementById('doc_date').value,
            hosp: document.getElementById('hospital').value,
            doc: document.getElementById('doctor').value,
            addr: document.getElementById('address').value,
            model: document.getElementById('model').value,
            period: document.getElementById('period').value,
            specs: document.getElementById('specs').value.replace(/\n/g, '<br>')
        };

        // 워드용 HTML 템플릿 생성
        const content = `
            <html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
            <head><meta charset='utf-8'><title>Demo Agreement</title>
            <style>
                body { font-family: 'Malgun Gothic', sans-serif; line-height: 1.6; }
                h1 { text-align: center; font-size: 20pt; text-decoration: underline; }
                table { width: 100%; border-collapse: collapse; margin: 20px 0; }
                th, td { border: 1px solid #000; padding: 10px; text-align: left; font-size: 10pt; }
                .footer { margin-top: 50px; text-align: center; }
            </style>
            </head>
            <body>
                <h1>데모 장비 사용 신청 및 합의서</h1>
                <p style="text-align:right;">신청일: ${data.date}</p>
                
                <h3>1. 신청 정보</h3>
                <table>
                    <tr><th width="20%">신청자</th><td>${data.requester}</td><th width="20%">부서</th><td>Sales Team</td></tr>
                    <tr><th>병원명</th><td>${data.hosp}</td><th>원장명</th><td>${data.doc}</td></tr>
                    <tr><th>주소</th><td colspan="3">${data.addr}</td></tr>
                </table>

                <h3>2. 데모 내역</h3>
                <table>
                    <tr><th width="20%">장비 모델</th><td>${data.model}</td></tr>
                    <tr><th>사용 기간</th><td>${data.period}</td></tr>
                    <tr><th>상세 구성</th><td>${data.specs}</td></tr>
                </table>

                <h3>3. 합의 사항</h3>
                <p>본 장비 사용과 관련하여 고객은 켄델라코리아의 관리 규정을 준수하며, 대여 기간 중 발생하는 장비의 파손, 분실에 대해 원상복구 또는 실비 변상의 책임을 질 것에 합의합니다.</p>
                
                <div class="footer">
                    <p>2026년    월    일</p>
                    <br><br>
                    <p>신청인 (병원): ____________________ (인)</p>
                    <p>공급인 (켄델라): ____________________ (인)</p>
                </div>
            </body>
            </html>
        `;

        // 파일 다운로드 실행
        const blob = new Blob(['\ufeff' + content], { type: 'application/msword' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = `데모신청서_${data.hosp || '미지정'}.doc`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
</script>

</body>
</html>
