<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>장비 신청 시스템 - 워드 저장 기능</title>
    <script src="https://unpkg.com/docx@7.1.0/build/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    
    <style>
        body { font-family: 'Pretendard', sans-serif; margin: 0; display: flex; background: #f5f6f7; color: #333; }
        .sidebar { width: 260px; height: 100vh; background: #2c3e50; color: white; position: fixed; padding: 25px 20px; box-sizing: border-box; }
        .sidebar h2 { font-size: 1.2rem; margin-bottom: 40px; border-bottom: 1px solid #5d6d7e; padding-bottom: 15px; }
        .nav-item { display: block; color: #adb5bd; text-decoration: none; padding: 15px; border-radius: 8px; margin-bottom: 10px; cursor: pointer; transition: 0.3s; }
        .nav-item:hover, .nav-item.active { background: #3498db; color: white; }

        .main-content { margin-left: 260px; padding: 50px; width: 100%; max-width: 1000px; box-sizing: border-box; }
        .page { display: none; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .page.active { display: block; }

        h1 { font-size: 1.6rem; color: #2c3e50; text-align: center; border-bottom: 2px solid #3498db; padding-bottom: 10px; margin-bottom: 30px; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 25px; }
        th, td { border: 1px solid #dee2e6; padding: 12px; font-size: 0.95rem; }
        th { background: #f8f9fa; width: 20%; text-align: left; }
        input { width: 100%; padding: 8px; border: 1px solid #ced4da; border-radius: 4px; box-sizing: border-box; }

        .agreement-box { background: #fdfdfd; padding: 15px; border: 1px solid #eee; height: 200px; overflow-y: auto; font-size: 0.85rem; margin-bottom: 20px; border-radius: 5px; line-height: 1.6; }
        .btn-save { background: #e67e22; color: white; border: none; padding: 12px 30px; border-radius: 6px; font-size: 1rem; font-weight: bold; cursor: pointer; width: 100%; }
        .btn-save:hover { background: #d35400; }
    </style>
</head>
<body>

    <nav class="sidebar">
        <h2>CANDELA KOREA</h2>
        <a onclick="showPage('page1')" class="nav-item active" id="menu-page1">1. 데모장비신청서</a>
        <a onclick="showPage('page2')" class="nav-item" id="menu-page2">2. 장비사용합의서</a>
    </nav>

    <main class="main-content">
        <section id="page1" class="page active">
            <h1>켄델라 코리아 장비 사용신청서</h1>
            <table>
                <tr>
                    <th>신청일자</th><td><input type="date" id="apply_date"></td>
                    <th>신청목적</th><td><input type="text" id="apply_purpose" value="DEMO"></td>
                </tr>
                <tr>
                    <th>신청부서</th><td><input type="text" id="dept" value="Sales Team"></td>
                    <th>신청자</th><td><input type="text" id="requester"></td>
                </tr>
                <tr>
                    <th>대상병원명</th><td><input type="text" id="hospital_name"></td>
                    <th>원장님 성함</th><td><input type="text" id="doctor_name"></td>
                </tr>
                <tr>
                    <th>신청 장비</th><td><input type="text" id="device_model"></td>
                    <th>사용기간</th><td><input type="text" id="duration" placeholder="예: 2026-04-01 ~ 04-07"></td>
                </tr>
            </table>
            <button class="btn-save" onclick="downloadWord('page1')">워드 파일로 저장 및 다운로드</button>
        </section>

        <section id="page2" class="page">
            <h1>장비 사용 합의서</h1>
            <div class="agreement-box">
                <p>본 합의서는 켄델라코리아와 고객 간의 장비 대여 계약 내용을 포함합니다...</p>
                <p>(중략) 제1조: 장비의 소유권은 켄델라코리아에 있음.</p>
                <p>제2조: 고객은 장비를 선량한 관리자의 주의의무로 관리함.</p>
            </div>
            <table>
                <tr>
                    <th>병원명(고객)</th><td><input type="text" id="agree_hospital"></td>
                </tr>
                <tr>
                    <th>서명일자</th><td><input type="date" id="agree_date"></td>
                </tr>
            </table>
            <button class="btn-save" onclick="downloadWord('page2')">합의서 워드 다운로드</button>
        </section>
    </main>

    <script>
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(m => m.classList.remove('active'));
            document.getElementById('menu-' + pageId).classList.add('active');
        }
